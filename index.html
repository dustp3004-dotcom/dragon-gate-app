<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#c0392b" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- iOS PWA support -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Dragon Gate" />
    <link rel="apple-touch-icon" href="/icon-192.png" />

    <!-- SEO -->
    <title>Dragon Gate Asian Pantry</title>
    <meta name="description" content="Premium Asian Ingredients - Serving all Johannesburg. Order online with free delivery on orders over R1,000." />

    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: #c0392b; font-family: sans-serif; }
      #root { min-height: 100vh; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Register service worker
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('SW registered'))
            .catch(err => console.log('SW failed:', err));
        });
      }
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
